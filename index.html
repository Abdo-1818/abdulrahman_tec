<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Abdulrahman Tec | حلول المشاكل البرمجية</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00C6FF;
            --primary-dark: #0099CC;
            --primary-light: #33D1FF;
            --black: #0A0A1A;
            --black-light: #1A1A2E;
            --white: #FFFFFF;
            --gray: #B0B0D0;
            --gray-dark: #7070A0;
            --border: rgba(0, 198, 255, 0.2);
            --shadow: 0 10px 40px rgba(0, 198, 255, 0.2);
            --glow: 0 0 40px rgba(0, 198, 255, 0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--black);
            color: var(--white);
            line-height: 1.9;
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: float 20s infinite;
        }

        .bg-orb:nth-child(1) {
            width: 700px;
            height: 700px;
            background: #00C6FF;
            top: -200px;
            right: -200px;
        }

        .bg-orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: #0099CC;
            bottom: -150px;
            left: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.1); }
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 198, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 198, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 0 40px;
        }

        .logo-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00C6FF, #FFFFFF, #00C6FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s infinite;
            margin-bottom: 15px;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            color: var(--gray);
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Problem Form */
        .problem-form {
            max-width: 700px;
            margin: 0 auto 50px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--border);
            border-radius: 15px;
            color: var(--white);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 198, 255, 0.2);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 15px;
            color: var(--black);
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            box-shadow: 0 0 40px rgba(0, 198, 255, 0.5);
            transform: translateY(-2px);
        }

        /* Articles Section */
        .articles-section {
            padding: 40px 0;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 10px auto;
            border-radius: 2px;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .article-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s;
            cursor: pointer;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .article-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 198, 255, 0.2);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .article-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 198, 255, 0.1);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .article-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .article-preview {
            color: var(--gray);
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .read-more {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .read-more:hover {
            gap: 10px;
        }

        /* Solutions Section */
        .solutions-section {
            padding: 40px 0;
        }

        .solution-card {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(30px);
            border: 2px solid var(--border);
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 25px;
            transition: all 0.4s;
        }

        .solution-card:hover {
            border-color: var(--primary);
            box-shadow: 0 15px 50px rgba(0, 198, 255, 0.2);
        }

        .solution-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .solution-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .solution-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-lang {
            background: rgba(0, 198, 255, 0.2);
            color: var(--primary);
        }

        .badge-level {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .solution-content {
            color: var(--gray);
            line-height: 2;
            margin-bottom: 20px;
        }

        .solution-content h3 {
            color: var(--primary);
            margin: 20px 0 10px;
            font-size: 1.2rem;
        }

        .solution-content ul {
            list-style: none;
            padding-right: 0;
        }

        .solution-content ul li {
            padding: 8px 0;
            position: relative;
            padding-right: 25px;
        }

        .solution-content ul li::before {
            content: '▸';
            position: absolute;
            right: 0;
            color: var(--primary);
        }

        .code-block {
            background: #000000;
            border: 1px solid rgba(0, 198, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            overflow-x: auto;
            margin: 20px 0;
        }

        .code-block pre {
            color: #00C6FF;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            direction: ltr;
            text-align: left;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 18px;
            background: rgba(0, 198, 255, 0.2);
            border: 1px solid rgba(0, 198, 255, 0.3);
            color: var(--primary);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: var(--black);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .tag {
            padding: 5px 15px;
            background: rgba(0, 198, 255, 0.05);
            border: 1px solid rgba(0, 198, 255, 0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--gray);
            transition: all 0.3s;
        }

        .tag:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid var(--border);
            color: var(--gray-dark);
            font-size: 0.9rem;
            margin-top: 50px;
        }

        .footer span {
            color: var(--primary);
            font-weight: 700;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 80px 20px;
        }

        .no-results .icon {
            font-size: 80px;
            display: block;
            margin-bottom: 20px;
        }

        .no-results h3 {
            color: var(--gray);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--black);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-dark);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }
            .articles-grid {
                grid-template-columns: 1fr;
            }
            .problem-form {
                padding: 25px;
            }
        }

        /* Hidden initially */
        .hidden {
            display: none;
        }
    </style>
</head>

    <script>

                content: `
                    <h3>أهمية مواجهة أخطاء برمجية</h3>
                    <p>الإنسان غالباً ما يتعلم اتخاذ قرارات صائبة بسبب أخطائه التي ارتكبها في السابق، من هذا المنطلق نلاحظ أن الإنسان بطبعه يتعلم و يزداد وعيه من الأخطاء التي يواجهها في حياته.</p>
                    <p>ما ذكرناه قبل قليل ينطبق على البرمجة أيضاً حيث أن من يملك خبرة فيها تجده قادر على معرفة الخطأ الموجود في الكود و تصحيحه بكل سهولة في حين أنك كمبتدئ تنظر للخطأ تقول بينك و بين نفسك هذه هي النهاية سأترك البرمجة!</p>
                    <p>الشخص الذي تجده خبير في كتابة الكود و حل مشاكله ليس بالضرورة أن يكون أذكى منك كما تتصور فقد تكون هذه الأخطاء التي تجده يحلها مجرد أخطاء روتينية تافهة بالنسبة له. لا تظن أنك غبي بسبب عدم قدرتك على حل الأخطاء البرمجية كما يفعل أهل الخبرة و لا يجب أن تفكر بهذه الطريقة لأنك تظلم نفسك.</p>
                    <p>كن على يقين أن الشخص الذي يعرف كيف يحل المشاكل التي تظهر في الكود بسهولة و بسرعة هو مجرد شخص واجه نفس هذه المشاكل في السابق و أكثر من مرة مما جعله معتاداً عليها و أصبح بمجرد أن يرى رسائل الأخطاء التي تظهر في الكود تجده فهم المشكلة و أصلحها.</p>
                    <p>خلاصة، حين تواجه مشكلة في الكود إياك و أن تغضب بل إفرح لأنه بسبب هذه المشكلة فإن خبرتك ستزيد و وعيك البرمجي سيزيد.</p>

                    <h3>إفهم سبب المشكلة قبل أن تبحث عن حل لها</h3>
                    <p>للأسف، غالباً ما أجد المبتدئ مستعجلاً يريد الحل و لا يريد معرفة سبب المشكلة! إذا كنت من هذا النوع و تنوي البقاء من هذا النوع فكن على يقين أنك لن تصبح مبرمجاً في حياتك.</p>
                    <p>أي برنامج تستخدمه لكتابة الكود تجده في بعض الأحيان يظهر لك خطوط رمادية أو صفراء أو حمراء تحت الكود حتى يلفت نظرك له. ليس بالضرورة أن تكون جميع هذه الخطوط تشير لوجود مشاكل في الكود بل قد تكون مجرد إقتراحات يعلمك بها لكي تحسن الكود.</p>
                    <p>الخط الأحمر العامودي هدفه جعلك لا تكتب الكود كله على سطر واحد حتى لا تكون قراءته صعبة. الخط الرمادي الذي يظهر تحت إسم المتغير هد</p>`
            },
            {
                id: 2,
                title: "معالجة الأخطاء البرمجية قبل التشغيل",
                preview: "تعلم كيفية التعامل مع الأخطاء التي تظهر في الكود قبل تشغيله وكيفية فهم رسائل التحذير والتنبيهات.",
                category: "تصحيح الأخطاء",
                tags: ["أخطاء", "Syntax", "تحذيرات"],
                content: `
                    <h3>معالجة الأخطاء البرمجية التي تظهر قبل تشغيل الكود</h3>
                    <p>عند كتابة الكود لا بد من أن تحترم قواعد لغة البرمجة التي تتعامل معها و إلا فإن البرنامج الذي تستخدمه لكتابة الكود سيظهر لك خطوط حمراء تحت الكود ليخبرك بوجود مشاكل يجب أن تحلها لكي يعمل الكود.</p>
                    <p>كمثال بسيط، في لغة جافا إذا حاولت تخزين عدد يحتوي على فاصلة عشرية مثل <code>1.5</code> في متغير نوعه <code>int</code> فإن هذا الأمر غير مسموح لأن هذا النوع مخصص لتخزين أعداد صحيحة لا تحتوي فاصلة.</p>
                    <p>إذاً مخالفتك لقواعد اللغة تستدعي إظهار خط أحمر تحت الكود الذي يسبب المشكلة حتى تصلحها، و إذا مررت الماوس فوق الخط الأحمر سيظهر لك سبب المشكلة.</p>
                    <p>إذا نقرت على زر اللمبة الذي سيظهر لك بجانب السطر الذي فيه المشكلة سيظهر لك إقتراحات لحل المشكلة. انتبه جيداً، الإقتراحات التي تظهر لك عند النقر على اللمبة قد تكون مناسبة للكود و تعتبر الحل الذي تحتاجه و قد تكون غير مناسبة لهذا عليك أيضاً أن تقرأ الإقتراحات و تراجع قواعد اللغة بنفسك لمعرفة ما هو الإقتراح المناسب.</p>

                    <h3>هل الإصلاح التلقائي للكود هو دائماً الحل الأفضل؟</h3>
                    <p>كلا طبعاً و إياك التفكير بأن الإقتراحات التي يظهرها لك البرنامج هي دائماً أفضل الحلول الممكنة.</p>
                    <p>لتفهم ما نقصده أكثر، في المثال السابق كان الأفضل تحويل نوع المتغير <code>total</code> إلى النوع <code>float</code> بدل النوع <code>double</code> لأن النوع <code>double</code> يحتاج مساحة أكبر في الذاكرة و هذه المساحة لم نكن بحاجتها أصلاً.</p>`

            {
                id: 3,

                preview: "تعلم قراءة وفهم رسائل الخطأ التي تظهر أثناء تشغيل البرنامج وكيفية تتبع مصدر المشكلة.",
                category: "تصحيح الأخطاء",
                tags: ["Runtime", "Exceptions", "Debugging"],
                content: `
                    <h3>تحليل رسالة الخطأ الذي ظهر عند التشغيل</h3>

                    <div class="solution-card">
                        <div class="solution-header">
                            <h2 class="solution-title">${solution.title}</h2>
                            <div class="solution-badges">
                                <span class="badge badge-lang">${solution.lang}</span>
                                <span class="badge badge-level">${solution.level}</span>
                            </div>
                        </div>
                        <div class="solution-content">
                            <p style="font-weight: 600; color: var(--primary);">${solution.description}</p>
                            ${solution.content}
                        </div>
                        ${solution.code ? `
                            <div class="code-block">
                                <button class="copy-btn" onclick="copyCode(this, \`${solution.code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">📋 نسخ الكود</button>
                                <pre>${solution.code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                            </div>
                        ` : ''}
                        <div class="tags">
                            ${solution.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('solutionsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ===== BACK TO ARTICLES =====
        function backToArticles() {
            document.getElementById('articlesSection').classList.remove('hidden');
            document.getElementById('solutionsSection').classList.add('hidden');
            document.getElementById('articlesSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.getElementById('userProblem').value = '';
            document.getElementById('userName').value = '';
        }

        // ===== COPY CODE =====
        function copyCode(button, code) {
            const decoded = code
                .replace(/\\n/g, '\n')
                .replace(/\\'/g, "'")
                .replace(/\\`/g, '`')
                .replace(/\\$/g, '$')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>');

            navigator.clipboard.writeText(decoded).then(() => {
                const original = button.innerHTML;
                button.innerHTML = '✅ تم النسخ!';
                button.style.background = '#4CAF50';
                button.style.border = '1px solid #4CAF50';
                button.style.color = 'white';
                
                setTimeout(() => {
                    button.innerHTML = original;
                    button.style.background = '';
                    button.style.border = '';
                    button.style.color = '';
                }, 2000);
            });
        }

        // ===== KEYBOARD SHORTCUT =====
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                solveProblem();
            }
        });

        // ===== INIT =====
        init();
    </script>
</body>
</html>
