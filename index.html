        // ========== QUIZ GENERATOR (10 MCQs) ==========
        function generateQuiz(courseId, topicName, lang) {
            const mcqs = [];
            const topics = {
                html: ['<h1>','<p>','<a>','<img>','<ul>','<ol>','<table>','<div>','<span>','<form>'],
                css: ['color','font-size','margin','padding','border','display','position','flexbox','grid','background'],
                python: ['print()','def','if','for','while','list','dict','str','int','float'],
                cpp: ['cout','cin','int','string','vector','class','return','void','main()','#include'],
                php: ['echo','$','array','function','class','foreach','if','else','POST','GET'],
                react: ['useState','JSX','props','component','useEffect','Router','Redux','hooks','render','key']
            };
            const pool = topics[courseId] || topics['html'];
            const isAr = lang === 'ar';
            for(let i=0; i<10; i++) {
                const word = pool[i % pool.length];
                const correct = word;
                const options = new Set([correct]);
                while(options.size < 4) {
                    const rand = pool[Math.floor(Math.random() * pool.length)];
                    if(rand !== correct) options.add(rand);
                }
                const optsArr = [...options].sort(() => Math.random() - 0.5);
                mcqs.push({
                    question: isAr ? `أي مما يلي يمثل ${word} بشكل صحيح؟` : `Which of the following correctly represents ${word}?`,
                    options: optsArr,
                    correct
                });
            }
            return mcqs;
        }

        // ========== LESSON CONTENT (150 lines simplified) ==========

            quizHTML += `</div>`;

            const content = isAr ? `

        function checkAnswer(btn, correctAnswer) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected','correct','wrong'));
            if(btn.dataset.answer === correctAnswer) {
                btn.classList.add('correct');
                parent.nextElementSibling.style.display = 'block';
                parent.nextElementSibling.textContent = currentLang==='ar' ? '✅ إجابة صحيحة!' : '✅ Correct!';
                parent.nextElementSibling.style.color = '#4CAF50';
            } else {
                btn.classList.add('wrong');
                parent.querySelector(`.quiz-option[data-answer="${correctAnswer}"]`).classList.add('correct');
                parent.nextElementSibling.style.display = 'block';
                parent.nextElementSibling.textContent = currentLang==='ar' ? '❌ خطأ، الإجابة الصحيحة محددة.' : '❌ Wrong, correct answer is highlighted.';
                parent.nextElementSibling.style.color = '#F44336';
            }
            parent.querySelectorAll('.quiz-option').forEach(b => b.style.pointerEvents = 'none');
        }

        function createCourse(id, icon, nameEn, nameAr, descKey, lessonCount) {
            const lessons = [];
            for(let i=0; i<lessonCount; i++) {
                lessons.push({
                    title: { en: `${nameEn} Lesson ${i+1}`, ar: `${nameAr} درس ${i+1}` },
                    getContent: function(lang) { return generateLessonContent(id, i, lang); }
                });
            }
            return { id, icon, name:{en:nameEn,ar:nameAr}, descKey, lessons };
        }

        const coursesDB = [
            createCourse('html','🌐','HTML','HTML','html_desc',50),
            createCourse('css','🎨','CSS','CSS','css_desc',70),
            createCourse('python','🐍','Python','بايثون','python_desc',72),
            createCourse('cpp','⚡','C++','سي بلس بلس','cpp_desc',50),
            createCourse('php','🐘','PHP','بي اتش بي','php_desc',60),
            createCourse('react','⚛️','React','رياكت','react_desc',66)
        ];

        let activeCourseId = null, activeLessonIndex = 0;

        function switchLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
            document.body.classList.toggle('rtl', lang==='ar');
            document.documentElement.dir = lang==='ar'?'rtl':'ltr';
            document.documentElement.lang = lang;
            updateAllTranslations();
            localStorage.setItem('lang', lang);
            if(activeCourseId) renderCourseDetail(activeCourseId);
        }
        function updateAllTranslations() { document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.getAttribute('data-i18n'); const tr=t(k); if(tr) el.textContent=tr; }); renderCourses(); }
        function renderCourses() {
            document.getElementById('coursesGrid').innerHTML = coursesDB.map((c,i)=>`
            <div class="course-card" style="animation-delay:${i*0.06}s" onclick="openCourse('${c.id}')">
              <div class="course-card-icon">${c.icon}</div>
              <h3 class="course-card-title">${c.name[currentLang]||c.name.en}</h3>
              <p class="course-card-desc">${t(c.descKey)}</p>
              <span style="color:#000;font-weight:600;">${t('start_learning')}</span>
            </div>`).join('');
        }
        function openCourse(id) { activeCourseId=id; activeLessonIndex=0; document.getElementById('coursesSection').classList.add('hidden'); document.getElementById('courseDetailSection').classList.remove('hidden'); renderCourseDetail(id); }
        function renderCourseDetail(id) {
            const course = coursesDB.find(c=>c.id===id);
            if(!course) return;
            const container = document.getElementById('courseDetailContainer');
            const navHTML = course.lessons.map((l,i)=>`<button class="lesson-nav-btn ${i===activeLessonIndex?'active':''}" onclick="navigateLesson(${i})">${t('lesson')} ${i+1}</button>`).join('');
            container.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;background:#1A1A1A;padding:18px;border-radius:22px;color:#FFF;">
              <span style="font-size:2.5rem;">${course.icon}</span>
              <h2 style="font-size:1.7rem;font-weight:800;color:#FFF;flex:1;">${course.name[currentLang]||course.name.en}</h2>
              <button class="back-btn" style="background:#FFF;color:#000;border-color:#FFF;" onclick="backToCourses()">${t('back_btn')}</button>
            </div>
            <div class="lesson-nav">${navHTML}</div>
            <div class="lesson-content" id="lessonContentArea"></div>`;
            loadLessonContent(course);
        }
        function loadLessonContent(course) {
            const area = document.getElementById('lessonContentArea');
            const lesson = course.lessons[activeLessonIndex];
            area.innerHTML = `
            ${lesson.getContent(currentLang)}
            <div style="display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:2px solid #1A1A1A;">
              <button class="back-btn" onclick="navigateLesson(${activeLessonIndex-1})" ${activeLessonIndex===0?'style="opacity:0.35;pointer-events:none"':''}>← ${currentLang==='ar'?'السابق':'Previous'}</button>
              <button class="back-btn" onclick="navigateLesson(${activeLessonIndex+1})" ${activeLessonIndex>=course.lessons.length-1?'style="opacity:0.35;pointer-events:none"':''}>${currentLang==='ar'?'التالي':'Next'} →</button>
            </div>`;
            document.getElementById('courseDetailSection').scrollIntoView({behavior:'smooth'});
        }
        function navigateLesson(idx) { const course = coursesDB.find(c=>c.id===activeCourseId); if(!course||idx<0||idx>=course.lessons.length) return; activeLessonIndex=idx; renderCourseDetail(activeCourseId); }
        function backToCourses() { activeCourseId=null; document.getElementById('coursesSection').classList.remove('hidden'); document.getElementById('courseDetailSection').classList.add('hidden'); }
        function escapeHTML(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
        document.addEventListener('click', function(e) {
            if(e.target.classList.contains('copy-btn')) {
                const pre = e.target.closest('.code-block')?.querySelector('pre');
                if(pre) navigator.clipboard.writeText(pre.textContent).then(()=>{
                    e.target.textContent = t('copied');
                    setTimeout(()=>{ e.target.textContent = t('copy_btn'); }, 2000);
                });
            }
        });
        document.addEventListener('keydown', e=>{
            if(e.key==='Escape' && activeCourseId) backToCourses();
            if(e.key==='ArrowRight' && activeCourseId && !document.body.classList.contains('rtl')) navigateLesson(activeLessonIndex+1);
            if(e.key==='ArrowLeft' && activeCourseId && !document.body.classList.contains('rtl')) navigateLesson(activeLessonIndex-1);
        });
        function init() {
            const saved = localStorage.getItem('lang');
            if(saved && translations[saved]) { currentLang=saved; document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active')); const btn=document.querySelector(`[data-lang="${saved}"]`); if(btn) btn.classList.add('active'); if(saved==='ar') { document.body.classList.add('rtl'); document.documentElement.dir='rtl'; document.documentElement.lang='ar'; } }
            updateAllTranslations();
            renderCourses();
        }
        init();
    </script>
